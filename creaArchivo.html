<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>libgraph3 IDE - Inicio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            background: #1e1e1e;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #252526;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        h1 {
            margin-top: 0;
        }

        button {
            background: #007acc;
            border: none;
            color: white;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        button:hover {
            background: #005a9e;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📐 libgraph3 IDE</h1>
        <p>Crear o cargar un proyecto en C</p>
        <button id="nuevo">➕ Nuevo archivo .c</button>
        <button id="crearProyecto">📁 Crear proyecto C</button>
        <button id="cargar">📂 Cargar archivo .c</button>
        <input type="file" id="fileInput" accept=".c">
    </div>

    <!-- Modal para nuevo proyecto -->
    <div id="modal-proyecto"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:999;">
        <div style="background:#252526; padding:30px; border-radius:8px; width:400px; color:white;">
            <h2>📁 Nuevo proyecto C</h2>
            <label>Nombre del proyecto:</label>
            <input type="text" id="proj-name"
                style="width:100%; padding:8px; margin:8px 0; background:#1e1e1e; color:white; border:1px solid #3c3c3c; border-radius:4px;">

            <label style="display:block; margin:12px 0;">
                <input type="checkbox" id="use-db"> Usar base de datos
            </label>

            <div id="db-options"
                style="margin:10px 0; display:none; padding:10px; background:#1e1e1e; border-radius:4px;">
                <label style="display:block; margin:5px 0;">
                    <input type="radio" name="db-type" value="mariadb"> MariaDB
                </label>
                <label style="display:block; margin:5px 0;">
                    <input type="radio" name="db-type" value="sqlite"> SQLite
                </label>
            </div>

            <div style="margin-top:20px;">
                <button id="btn-generar-proyecto"
                    style="background:#007acc; border:none; color:white; padding:10px 20px; border-radius:4px; cursor:pointer;">
                    📦 Generar y descargar
                </button>
                <button id="btn-cancelar-modal"
                    style="background:#3c3c3c; border:none; color:white; padding:10px 20px; border-radius:4px; cursor:pointer;">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Navegación ---
        document.getElementById('nuevo').addEventListener('click', () => {
            const codigoBase = `#include <libgraph3.h>\n\nint main() {\n    int gd = DETECT, gm;\n    initgraph(&gd, &gm, "");\n    setbkcolor(WHITE);\n    cleardevice();\n\n    //COMPONENTES\n\n    getch();\n    closegraph();\n    return 0;\n}\n`;
            localStorage.setItem('codigoC', codigoBase);
            window.location.href = 'editor.html';
        });

        document.getElementById('cargar').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', function (e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                localStorage.setItem('codigoC', ev.target.result);
                window.location.href = 'editor.html';
            };
            reader.readAsText(file);
        });

        // --- Manejo del modal ---
        const modal = document.getElementById('modal-proyecto');
        const btnCrearProyecto = document.getElementById('crearProyecto');
        const btnCancelar = document.getElementById('btn-cancelar-modal');
        const useDbCheckbox = document.getElementById('use-db');
        const dbOptions = document.getElementById('db-options');

        btnCrearProyecto.addEventListener('click', () => {
            modal.style.display = 'flex';
            document.getElementById('proj-name').value = '';
            useDbCheckbox.checked = false;
            dbOptions.style.display = 'none';
            document.querySelectorAll('input[name="db-type"]').forEach(el => el.checked = false);
        });

        btnCancelar.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        useDbCheckbox.addEventListener('change', () => {
            dbOptions.style.display = useDbCheckbox.checked ? 'block' : 'none';
        });

        // --- Generador de proyectos ---
        function generarProyecto(nombre, usarBD, tipoBD) {
            const archivos = {};
            const basePath = `${nombre}/src/`;

            // 1. Entidad User
            archivos[`${basePath}entities/user.h`] = `#ifndef USER_H\n#define USER_H\n\ntypedef struct {\n    int id;\n    char name[50];\n    char email[50];\n} User;\n\nUser* create_user(int id, const char* name, const char* email);\nvoid destroy_user(User* user);\n\n#endif\n`;

            archivos[`${basePath}entities/user.c`] = `#include "user.h"\n#include <stdlib.h>\n#include <string.h>\n\nUser* create_user(int id, const char* name, const char* email) {\n    User* u = (User*)malloc(sizeof(User));\n    u->id = id;\n    strcpy(u->name, name);\n    strcpy(u->email, email);\n    return u;\n}\n\nvoid destroy_user(User* user) {\n    free(user);\n}\n`;

            // 2. Interfaz de repositorio
            archivos[`${basePath}interfaces/user_repository.h`] = `#ifndef USER_REPOSITORY_H\n#define USER_REPOSITORY_H\n\n#include "../entities/user.h"\n\ntypedef struct UserRepository {\n    int (*save)(User* user);\n    User* (*find_by_id)(int id);\n} UserRepository;\n\n#endif\n`;

            // 3. Caso de uso
            archivos[`${basePath}usecases/register_user.h`] = `#ifndef REGISTER_USER_H\n#define REGISTER_USER_H\n\n#include "../entities/user.h"\n#include "../interfaces/user_repository.h"\n\nint register_user(UserRepository* repo, const char* name, const char* email);\n\n#endif\n`;

            archivos[`${basePath}usecases/register_user.c`] = `#include "register_user.h"\n#include <stdlib.h>\n#include <string.h>\n\nint register_user(UserRepository* repo, const char* name, const char* email) {\n    User* u = create_user(1, name, email);\n    int result = repo->save(u);\n    destroy_user(u);\n    return result;\n}\n`;

            // 4. Infraestructura según tipo de BD
            if (usarBD && tipoBD === 'mariadb') {
                archivos[`${basePath}infrastructure/mariadb_user_repository.h`] = `#ifndef MARIADB_USER_REPOSITORY_H\n#define MARIADB_USER_REPOSITORY_H\n\n#include "../interfaces/user_repository.h"\n\nUserRepository* create_mariadb_repository();\n\n#endif\n`;

                archivos[`${basePath}infrastructure/mariadb_user_repository.c`] = `#include "mariadb_user_repository.h"\n#include <stdlib.h>\n#include <stdio.h>\n\nstatic int save_to_mariadb(User* user) {\n    printf("Guardando usuario %s en MariaDB\\n", user->name);\n    return 0;\n}\n\nUserRepository* create_mariadb_repository() {\n    UserRepository* repo = (UserRepository*)malloc(sizeof(UserRepository));\n    repo->save = save_to_mariadb;\n    repo->find_by_id = NULL;\n    return repo;\n}\n`;
            } else if (usarBD && tipoBD === 'sqlite') {
                archivos[`${basePath}infrastructure/sqlite_user_repository.h`] = `#ifndef SQLITE_USER_REPOSITORY_H\n#define SQLITE_USER_REPOSITORY_H\n\n#include "../interfaces/user_repository.h"\n\nUserRepository* create_sqlite_repository();\n\n#endif\n`;

                archivos[`${basePath}infrastructure/sqlite_user_repository.c`] = `#include "sqlite_user_repository.h"\n#include <stdlib.h>\n#include <stdio.h>\n\nstatic int save_to_sqlite(User* user) {\n    printf("Guardando usuario %s en SQLite\\n", user->name);\n    return 0;\n}\n\nUserRepository* create_sqlite_repository() {\n    UserRepository* repo = (UserRepository*)malloc(sizeof(UserRepository));\n    repo->save = save_to_sqlite;\n    repo->find_by_id = NULL;\n    return repo;\n}\n`;
            } else {
                archivos[`${basePath}infrastructure/file_user_repository.h`] = `#ifndef FILE_USER_REPOSITORY_H\n#define FILE_USER_REPOSITORY_H\n\n#include "../interfaces/user_repository.h"\n\nUserRepository* create_file_repository();\n\n#endif\n`;

                archivos[`${basePath}infrastructure/file_user_repository.c`] = `#include "file_user_repository.h"\n#include <stdlib.h>\n#include <stdio.h>\n\nstatic int save_to_file(User* user) {\n    FILE* f = fopen("users.txt", "a");\n    if (!f) return -1;\n    fprintf(f, "%d,%s,%s\\n", user->id, user->name, user->email);\n    fclose(f);\n    return 0;\n}\n\nUserRepository* create_file_repository() {\n    UserRepository* repo = (UserRepository*)malloc(sizeof(UserRepository));\n    repo->save = save_to_file;\n    repo->find_by_id = NULL;\n    return repo;\n}\n`;
            }

            // 5. main.c
            let mainContent = `#include <stdio.h>\n#include "usecases/register_user.h"\n`;

            if (usarBD && tipoBD === 'mariadb') {
                mainContent += `#include "infrastructure/mariadb_user_repository.h"\n\n`;
            } else if (usarBD && tipoBD === 'sqlite') {
                mainContent += `#include "infrastructure/sqlite_user_repository.h"\n\n`;
            } else {
                mainContent += `#include "infrastructure/file_user_repository.h"\n\n`;
            }

            mainContent += `int main() {\n    UserRepository* repo = `;

            if (usarBD && tipoBD === 'mariadb') {
                mainContent += `create_mariadb_repository()`;
            } else if (usarBD && tipoBD === 'sqlite') {
                mainContent += `create_sqlite_repository()`;
            } else {
                mainContent += `create_file_repository()`;
            }

            mainContent += `;\n\n    if (register_user(repo, "Juan Pérez", "juan@example.com") == 0) {\n        printf("Usuario registrado exitosamente.\\n");\n    } else {\n        printf("Error al registrar usuario.\\n");\n    }\n\n    free(repo);\n    return 0;\n}\n`;

            archivos[`${basePath}main.c`] = mainContent;

            // 6. CMakeLists.txt
            archivos[`${nombre}/CMakeLists.txt`] = `cmake_minimum_required(VERSION 3.10)\nproject(${nombre})\n\nset(CMAKE_C_STANDARD 99)\n\n`;
            if (usarBD && tipoBD === 'mariadb') {
                archivos[`${nombre}/CMakeLists.txt`] += `find_package(MariaDB REQUIRED)\n`;
            } else if (usarBD && tipoBD === 'sqlite') {
                archivos[`${nombre}/CMakeLists.txt`] += `find_package(SQLite3 REQUIRED)\n`;
            }
            archivos[`${nombre}/CMakeLists.txt`] += `\nadd_executable(${nombre}\n    src/main.c\n    src/entities/user.c\n    src/usecases/register_user.c\n    src/infrastructure/file_user_repository.c\n`;

            if (usarBD && tipoBD === 'mariadb') {
                archivos[`${nombre}/CMakeLists.txt`] += `    src/infrastructure/mariadb_user_repository.c\n`;
            } else if (usarBD && tipoBD === 'sqlite') {
                archivos[`${nombre}/CMakeLists.txt`] += `    src/infrastructure/sqlite_user_repository.c\n`;
            }

            archivos[`${nombre}/CMakeLists.txt`] += `)\n\n`;

            if (usarBD && tipoBD === 'mariadb') {
                archivos[`${nombre}/CMakeLists.txt`] += `target_link_libraries(${nombre} mariadb)\n`;
            } else if (usarBD && tipoBD === 'sqlite') {
                archivos[`${nombre}/CMakeLists.txt`] += `target_link_libraries(${nombre} SQLite3)\n`;
            }

            // 7. README.md
            archivos[`${nombre}/README.md`] = `# ${nombre}\n\nProyecto generado con libgraph3 IDE.\n\n## Estructura\n\n\`\`\`\nsrc/\n  ├── entities/       # Entidades de negocio\n  ├── usecases/       # Casos de uso\n  ├── interfaces/     # Interfaces (contratos)\n  └── infrastructure/ # Implementaciones concretas\n\`\`\`\n\n## Compilación\n\n### Con CMake\n\`\`\`bash\nmkdir build && cd build\ncmake ..\nmake\n./${nombre}\n\`\`\`\n\n### Con GCC (sin base de datos)\n\`\`\`bash\ngcc src/main.c src/entities/user.c src/usecases/register_user.c src/infrastructure/file_user_repository.c -o ${nombre}\n\`\`\``;

            // 8. .gitignore
            archivos[`${nombre}/.gitignore`] = `build/\n*.o\n*.so\n*.a\n*.out\n${nombre}\nusers.txt\n`;

            return archivos;
        }

        // --- Generar y descargar proyecto ---
        document.getElementById('btn-generar-proyecto').addEventListener('click', () => {
            const nombre = document.getElementById('proj-name').value.trim();
            const usarBD = document.getElementById('use-db').checked;
            const tipoBD = document.querySelector('input[name="db-type"]:checked')?.value || '';

            if (!nombre) {
                alert('Por favor, ingresa un nombre para el proyecto.');
                return;
            }

            if (usarBD && !tipoBD) {
                alert('Por favor, selecciona un tipo de base de datos.');
                return;
            }

            const archivos = generarProyecto(nombre, usarBD, tipoBD);

            const zip = new JSZip();
            for (const [ruta, contenido] of Object.entries(archivos)) {
                zip.file(ruta, contenido);
            }

            zip.generateAsync({ type: 'blob' }).then((blob) => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${nombre}.zip`;
                link.click();
                URL.revokeObjectURL(link.href);
                modal.style.display = 'none';
            });
        });
    </script>
</body>

</html>
